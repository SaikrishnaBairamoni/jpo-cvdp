name: cvdp
on: 
 workflow_dispatch:
    
jobs:
  cvdp:
   runs-on: ubuntu-latest
   container:
    image: ubuntu:jammy-20230126
    env:
      DEBIAN_FRONTEND: noninteractive
      INIT_ENV: "/home/jpo-cvdp/.base-image/init-env.sh"
      SONAR_SCANNER_VERSION: "4.6.2.2472"
      TERM: xterm
    options: "--user root"
   steps:
     - name: Checkout ${{ github.event.repository.name }}
       uses: actions/checkout@v3   
     - name: Install Latest Docker
       run: |
         apt update
         apt-get -y install sudo wget curl gnupg lsb-release 
         sudo apt-get -y install software-properties-common
         curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -
         sudo add-apt-repository -y "deb [arch=amd64] https://download.docker.com/linux/ubuntu  $(lsb_release -cs)  stable"
         #curl -L https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-`uname -s`-`uname -m` > docker-compose
         sudo curl -L "https://github.com/docker/compose/releases/download/1.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
         sudo apt-get -y update
         sudo apt-get -y install docker-ce
     - name: Check Docker Version
       run: docker --version && docker-compose version
     - name: install g++
       run: |
         sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
         sudo apt-get update -qq
         sudo apt-get install -qq g++-4.9
         export CXX="g++-4.9"
     - name: install librdkafka
       run: |
         git clone --depth 1 https://github.com/confluentinc/librdkafka.git /home/jpo-cvdp/ext/librdkafka
         cd /home/jpo-cvdp/ext/librdkafka/
         cmake -H. -B_cmake_build
         cmake --build _cmake_build
         cmake --build _cmake_build --target install
         sudo git clone https://github.com/edenhill/librdkafka.git && cd librdkafka && ./configure
         make
         sudo make install
         cd ..
         sudo mkdir /tmp/build
         sudo cd /tmp/build
         sudo cmake $$GITHUB_WORKSPACE
         sudo export LD_LIBRARY_PATH=/usr/local/lib
     - name: build
       run: 
         build-wrapper-linux-x86-64 --out-dir $$GITHUB_WORKSPACE/bw-output make
         clean all
         ./ppm_tests
         cd $$GITHUB_WORKSPACE
         mkdir coverage
         cd coverage
     - run:
         gcov $GITHUB_WORKSPACE/cv-lib/src/*.cpp --object-directory
         /tmp/build/cv-lib/CMakeFiles/CVLib.dir/src/
     - run: 
         gcov $$GITHUB_WORKSPACE/src/*.cpp --object-directory
         /tmp/build/CMakeFiles/ppm_tests.dir/src/
     - run: cd $$GITHUB_WORKSPACE
     - run: sonar-scanner
